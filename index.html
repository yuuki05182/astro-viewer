<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <!-- ★これが最重要（スマホ対応） -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>今見える星の一覧</title>
  <style>
    body { 
      font-family: sans-serif; 
      padding: 12px; 
      background: #f5f5f5; 
      color: #333; 
      font-size: 16px; /* ★全体を少し大きく */
    }

    h1 { 
      text-align: center; 
      margin-bottom: 8px; 
      font-size: 20px; /* ★小さすぎ防止 */
    }

    #updateTime { 
      text-align: center; 
      font-size: 14px; 
      color: #666; 
      margin-bottom: 15px; 
    }

    .controls { 
      margin-bottom: 15px; 
      text-align: center; 
    }

    select { 
      padding: 10px; 
      font-size: 16px; 
      border-radius: 8px; 
      width: 100%; /* ★スマホで押しやすく */
      max-width: 300px;
    }

    #accessCount { 
      text-align: center; 
      margin: 10px auto; 
      padding: 10px; 
      background: #e0f7fa; 
      color: #006064; 
      border-radius: 8px; 
      max-width: 300px; 
      display: none; 
    }

    .star-item {
      background: white; 
      padding: 14px; 
      margin-bottom: 10px;
      border-radius: 10px; 
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      border-left: 5px solid #ddd;
    }

    .name { 
      font-size: 18px; 
      font-weight: bold; 
      margin-bottom: 6px; 
    }

    .type { 
      color: #666; 
      font-size: 13px; 
      margin-bottom: 8px; 
    }

    .data-grid { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 6px; 
      font-size: 14px; 
    }

    .label { 
      color: #888; 
      font-size: 12px; 
    }

    /* ★PCのときだけ少し広げる */
    @media (min-width: 768px) {
      body {
        max-width: 600px;
        margin: auto;
      }
    }
  </style>
</head>
<body>

<h1>今見える星の一覧</h1>
<div id="updateTime"></div>
<div id="accessCount"></div>

<div class="controls">
  <select id="typeFilter">
    <option value="all">すべての天体</option>
    <option value="Planet">惑星のみ</option>
    <option value="Star">恒星のみ</option>
  </select>
</div>

<div id="list"></div>

<script>
let allObjects = [];

function formatTime(isoString) {
  if (isoString === "always_up") return "沈まない";
  if (isoString === "never_up") return "出ない";
  if (!isoString) return "—";
  const d = new Date(isoString);
  if (isNaN(d.getTime())) return "—";
  return d.toLocaleTimeString("ja-JP", { hour: '2-digit', minute: '2-digit' });
}

async function loadStars() {
  const url = "https://astro-proxy.y-imamine43.workers.dev/astro" + location.search;
  try {
    const res = await fetch(url);
    const data = await res.json();
    allObjects = data.objects;

    if (data.totalAccess !== undefined) {
      const countBox = document.getElementById("accessCount");
      countBox.innerText = `累計アクセス数: ${data.totalAccess}`;
      countBox.style.display = "block";
    }

    const t = new Date(data.timestamp);
    document.getElementById("updateTime").innerText = `更新: ${t.toLocaleString("ja-JP")}`;

    renderList();
  } catch (e) {
    document.getElementById("list").innerHTML = "<p>データの取得に失敗しました</p>";
  }
}

function renderList() {
  const typeFilter = document.getElementById("typeFilter").value;
  const list = document.getElementById("list");
  list.innerHTML = "";

  const moons = allObjects.filter(o => o.type === "Moon");
  const suns = allObjects.filter(o => o.type === "Sun");

  const planets = allObjects
    .filter(o => o.type === "Planet")
    .sort((a, b) => b.alt - a.alt);

  const stars = allObjects
    .filter(o => o.type === "Star")
    .sort((a, b) => b.alt - a.alt);

  const sortedAll = [...moons, ...suns, ...planets, ...stars];

  sortedAll.forEach(obj => {
    if (typeFilter !== "all" && obj.type !== typeFilter) return;

    const div = document.createElement("div");
    div.className = "star-item";

    if (obj.type === "Moon") {
        div.style.borderLeft = "5px solid #ffcc00";
        div.style.background = "#fffdf0";
    } else if (obj.type === "Sun") {
        div.style.borderLeft = "5px solid #ff5722";
    } else if (obj.type === "Planet") {
        div.style.borderLeft = "5px solid #81c784";
    } else {
        div.style.borderLeft = "5px solid #64b5f6";
    }

    div.innerHTML = `
      <div class="name">${obj.type === "Moon" ? "🌙" : obj.type === "Sun" ? "☀️" : "★"} ${obj.jpName || obj.name}</div>
      <div class="type">${
        obj.type === "Star" ? "恒星" : 
        obj.type === "Planet" ? "惑星" : 
        obj.type === "Sun" ? "太陽" : "月"
      }</div>
      <div class="data-grid">
        <div><span class="label">高度:</span> ${obj.alt.toFixed(1)}°</div>
        <div><span class="label">方位:</span> ${obj.direction} (${obj.az.toFixed(0)}°)</div>
        <div><span class="label">出:</span> ${formatTime(obj.rise)}</div>
        <div><span class="label">入:</span> ${formatTime(obj.set)}</div>
      </div>
    `;
    list.appendChild(div);
  });
}

document.getElementById("typeFilter").addEventListener("change", renderList);
loadStars();
</script>
</body>
</html>
